name: "Build & Publish Release (Auto-versioned)"

on:
   push:
      paths:
         - "desktop-sandbox/src-tauri/tauri.conf.json"
      branches:
         - main
   workflow_dispatch:
      inputs:
         tag:
            description: "Release Tag (e.g., v2.0.1)"
            required: true
            type: string

defaults:
   run:
      working-directory: desktop-sandbox

jobs:
   publish-tauri:
      permissions:
         contents: write
      strategy:
         fail-fast: false
         matrix:
            include:
               - platform: "macos-latest"
                 args: "--target aarch64-apple-darwin"
               - platform: "macos-latest"
                 args: "--target x86_64-apple-darwin"
               - platform: "ubuntu-22.04"
                 args: ""
               - platform: "windows-latest"
                 args: ""

      runs-on: ${{ matrix.platform }}
      defaults:
         run:
            shell: "bash"
      steps:
         - uses: actions/checkout@v4
           with:
              fetch-depth: 2

         - name: Set version from tag if workflow_dispatch
           if: github.event_name == 'workflow_dispatch'
           id: set_version_from_tag
           run: |
              TAG_VERSION=$(echo "${{ github.event.inputs.tag }}" | sed 's/^v//')
              if [ -z "$TAG_VERSION" ]; then
                echo "::error::Release Tag input is required and cannot be empty."
                exit 1
              fi
              echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT

         - name: Validate version change
           if: github.event_name == 'push'
           id: version_validation
           run: |
              cd src-tauri
              # Validate JSON structure
              if ! jq empty tauri.conf.json; then
                echo "::error::Invalid JSON in tauri.conf.json"
                exit 1
              fi

              # Extract current version
              CURRENT_VERSION=$(jq -r '.version' tauri.conf.json)
              if [ "$CURRENT_VERSION" = "null" ] || [ -z "$CURRENT_VERSION" ]; then
                echo "::error::Version field missing in tauri.conf.json"
                exit 1
              fi

              # Compare with previous version
              PREV_VERSION=$(git show HEAD^:src-tauri/tauri.conf.json | jq -r '.version')
              if [ "$CURRENT_VERSION" = "$PREV_VERSION" ]; then
                echo "::error::Version not changed (still $CURRENT_VERSION)"
                exit 1
              fi
              echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

         - name: Set version environment variable
           run: |
              if [ "${{ github.event_name }}" == "push" ]; then
                echo "VERSION=${{ steps.version_validation.outputs.version }}" >> $GITHUB_ENV
              elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
                echo "VERSION=${{ steps.set_version_from_tag.outputs.version }}" >> $GITHUB_ENV
              fi

         - name: Install Ubuntu dependencies
           if: matrix.platform == 'ubuntu-22.04'
           run: |
              sudo apt-get update
              sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

         - name: Install pnpm
           uses: pnpm/action-setup@v4
           with:
              version: latest

         - name: Setup Node.js
           uses: actions/setup-node@v4
           with:
              node-version: lts/*
              cache: "pnpm"

         - name: Install Rust
           uses: dtolnay/rust-toolchain@stable
           with:
              targets: ${{ matrix.platform == 'macos-latest' &&
                 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

         - name: Cache Rust build
           uses: swatinem/rust-cache@v2
           with:
              workspaces: "./desktop-sandbox/src-tauri -> target"

         - name: Install frontend dependencies
           run: pnpm install

         - name: Tauri build and publish
           uses: tauri-apps/tauri-action@v0
           env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           with:
              tagName: "v${{ env.VERSION }}"
              releaseName: "Task Bridge ${{ env.VERSION }}"
              releaseBody: ${{ steps.changelog.outputs.notes }}
              releaseDraft: false
              prerelease: false
              args: ${{ matrix.args }}
